<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tartak-Budrol — Strona Internetowa</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333;
      position: relative;
      overflow: hidden;
    }

    /* Timber slice — top left */
    body::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      background: url('images/timber-slice.webp') center / contain no-repeat;
      opacity: 0.06;
      top: -160px;
      left: -160px;
      pointer-events: none;
    }

    /* Decorative timber slice — bottom right */
    body::after {
      content: '';
      position: absolute;
      width: 560px;
      height: 560px;
      background: url('images/timber-slice.webp') center / contain no-repeat;
      opacity: 0.06;
      bottom: -120px;
      right: -100px;
      pointer-events: none;
    }

    .card {
      position: relative;
      max-width: 480px;
      width: 100%;
      padding: 48px 32px;
      text-align: center;
    }

    .logo {
      width: 260px;
      max-width: 80%;
      height: auto;
      margin-bottom: 32px;
    }

    .text {
      font-size: 1rem;
      line-height: 1.7;
      color: #555;
      margin-bottom: 40px;
    }

    .cta {
      display: inline-block;
      padding: 14px 40px;
      background: #d19b5d;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 6px;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .cta:hover {
      background: #b8843e;
      transform: translateY(-1px);
    }

    .cta:active {
      transform: translateY(0);
    }

    @media (max-width: 520px) {
      .card { padding: 40px 24px; }
      .logo { width: 200px; }
      body::before { width: 400px; height: 400px; top: -80px; left: -80px; }
      body::after { width: 320px; height: 320px; bottom: -60px; right: -60px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/logo-tartak.svg" alt="Tartak-Budrol" class="logo">
    <p class="text">
      Nowa strona internetowa Tartaku Budrol<br>w Płońsku jest gotowa do&nbsp;przejrzenia.
    </p>
    <a href="/pl" class="cta">Zobacz witrynę &rarr;</a>
  </div>
</body>
</html>
